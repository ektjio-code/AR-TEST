<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR View</title>

  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #e8e8e8; overflow: hidden; }

    model-viewer {
      width: 100%;
      height: calc(100% - 40px);
      background: #e8e8e8;
      --poster-color: #e8e8e8;
    }

    model-viewer::part(default-ar-button) {
      bottom: 24px;
      right: 50%;
      transform: translateX(50%);
    }

    #debug {
      height: 40px;
      padding: 8px 12px;
      font: 12px monospace;
      color: #333;
      background: #ddd;
      overflow-x: auto;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <model-viewer id="mv"
    src="knoose5.glb"
    ios-src="knoose5.usdz"
    alt="3D Model"
    ar
    ar-modes="scene-viewer webxr quick-look"
    camera-controls
    touch-action="pan-y"
    environment-image="neutral"
    shadow-intensity="1"
    exposure="2"
    auto-rotate
    autoplay
  ></model-viewer>

  <div id="debug">Loading...</div>

  <script type="module">
    const mv = document.getElementById('mv');
    const d = document.getElementById('debug');

    mv.addEventListener('load', () => {
      const dim = mv.getDimensions();
      d.textContent = '✅ Model loaded | Size: ' + dim.x.toFixed(2) + ' x ' + dim.y.toFixed(2) + ' x ' + dim.z.toFixed(2);
    });

    mv.addEventListener('error', (e) => {
      d.textContent = '❌ Error: ' + (e.detail || e.message || 'unknown');
    });

    mv.addEventListener('ar-status', (e) => {
      d.textContent += ' | AR: ' + e.detail.status;
    });

    setTimeout(() => {
      if (d.textContent === 'Loading...') {
        d.textContent = '⏳ Still loading... check file paths';
      }
    }, 10000);
  </script>

</body>
</html>
